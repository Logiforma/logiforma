name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - PROD
          - DEV

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'PROD' || 'DEV') }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'PROD' || 'DEV') }}
    steps:
      - name: Set config
        id: config
        run: |
          ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/main' && 'PROD' || 'DEV') }}"
          if [[ "$ENV" == "PROD" ]]; then
            echo "prefix=logiforma-prod" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=logiforma-dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        env:
          BUCKET: ${{ steps.config.outputs.prefix }}
        run: |
          # Sync all files with short cache, then override hashed assets with immutable cache
          aws s3 sync dist/ "s3://${BUCKET}" --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --no-progress

          aws s3 sync dist/assets/ "s3://${BUCKET}/assets/" \
            --cache-control "public, max-age=31536000, immutable" \
            --no-progress

          echo "✓ Deployed to s3://${BUCKET}"

      - name: Invalidate CloudFront cache
        env:
          PREFIX: ${{ steps.config.outputs.prefix }}
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${PREFIX}'].Id" --output text)

          if [[ -z "$DIST_ID" || "$DIST_ID" == "None" ]]; then
            echo "::error::No CloudFront distribution found with comment '${PREFIX}'. Run setup-infra first."
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" --paths "/*" --output text
          echo "✓ CloudFront cache invalidated ($DIST_ID)"
