name: Setup Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to set up"
        required: true
        type: choice
        options:
          - PROD
          - DEV

permissions:
  id-token: write
  contents: read

jobs:
  setup:
    name: Setup ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Set config
        id: config
        run: |
          if [[ "${{ inputs.environment }}" == "PROD" ]]; then
            echo "prefix=logiforma-prod" >> "$GITHUB_OUTPUT"
            echo "domain=logiforma.com" >> "$GITHUB_OUTPUT"
          else
            echo "prefix=logiforma-dev" >> "$GITHUB_OUTPUT"
            echo "domain=logiforma.dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # ── S3 Bucket ──────────────────────────────────────────────
      - name: Create S3 bucket
        env:
          BUCKET: ${{ steps.config.outputs.prefix }}
        run: |
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "✓ Bucket $BUCKET already exists"
          else
            aws s3api create-bucket --bucket "$BUCKET" --region us-east-1
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "✓ Bucket $BUCKET created"
          fi

      # ── ACM Certificate ────────────────────────────────────────
      - name: Request ACM certificate
        id: acm
        env:
          DOMAIN: ${{ steps.config.outputs.domain }}
          PREFIX: ${{ steps.config.outputs.prefix }}
        run: |
          EXISTING_ARN=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='${DOMAIN}' && (Status=='ISSUED' || Status=='PENDING_VALIDATION')].CertificateArn" \
            --output text | head -1)

          if [[ -n "$EXISTING_ARN" && "$EXISTING_ARN" != "None" ]]; then
            echo "✓ Certificate already exists: $EXISTING_ARN"
            echo "arn=$EXISTING_ARN" >> "$GITHUB_OUTPUT"
          else
            CERT_ARN=$(aws acm request-certificate \
              --domain-name "$DOMAIN" \
              --subject-alternative-names "www.${DOMAIN}" \
              --validation-method DNS \
              --region us-east-1 \
              --tags Key=Name,Value="$PREFIX" \
              --query 'CertificateArn' --output text)
            echo "✓ Certificate requested: $CERT_ARN"
            echo "arn=$CERT_ARN" >> "$GITHUB_OUTPUT"
            sleep 10
          fi

      # ── ACM DNS Validation via Cloudflare ───────────────────────
      - name: Add ACM DNS validation records to Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CERT_ARN: ${{ steps.acm.outputs.arn }}
          DOMAIN: ${{ steps.config.outputs.domain }}
        run: |
          ZONE_ID=$(curl -sf "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN}" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')

          if [[ -z "$ZONE_ID" || "$ZONE_ID" == "null" ]]; then
            echo "::error::Could not find Cloudflare zone for ${DOMAIN}"
            exit 1
          fi
          echo "Zone ID: $ZONE_ID"

          VALIDATION_RECORDS=$(aws acm describe-certificate \
            --certificate-arn "$CERT_ARN" --region us-east-1 \
            --query 'Certificate.DomainValidationOptions[].ResourceRecord' --output json)

          echo "$VALIDATION_RECORDS" | jq -c '.[]' | sort -u | while read -r record; do
            NAME=$(echo "$record" | jq -r '.Name' | sed 's/\.$//')
            VALUE=$(echo "$record" | jq -r '.Value' | sed 's/\.$//')
            TYPE=$(echo "$record" | jq -r '.Type')

            EXISTING=$(curl -sf "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${NAME}&type=${TYPE}" \
              -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result | length')

            if [[ "$EXISTING" -gt 0 ]]; then
              echo "✓ Validation record already exists: $NAME"
            else
              RESP=$(curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"${TYPE}\",\"name\":\"${NAME}\",\"content\":\"${VALUE}\",\"proxied\":false,\"ttl\":120}")
              echo "$RESP" | jq -r '"success: \(.success)"'
              echo "✓ Created validation record: $NAME"
            fi
          done

      - name: Wait for certificate validation
        env:
          CERT_ARN: ${{ steps.acm.outputs.arn }}
        run: |
          echo "Waiting for certificate validation (may take several minutes)…"
          aws acm wait certificate-validated \
            --certificate-arn "$CERT_ARN" --region us-east-1
          echo "✓ Certificate validated"

      # ── CloudFront ─────────────────────────────────────────────
      - name: Create CloudFront Origin Access Control
        id: oac
        env:
          PREFIX: ${{ steps.config.outputs.prefix }}
        run: |
          EXISTING_OAC=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${PREFIX}-oac'].Id" --output text)

          if [[ -n "$EXISTING_OAC" && "$EXISTING_OAC" != "None" ]]; then
            echo "✓ OAC already exists: $EXISTING_OAC"
            echo "id=$EXISTING_OAC" >> "$GITHUB_OUTPUT"
          else
            OAC_ID=$(aws cloudfront create-origin-access-control \
              --origin-access-control-config \
              "Name=${PREFIX}-oac,SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=s3,Description=OAC for ${PREFIX}" \
              --query 'OriginAccessControl.Id' --output text)
            echo "✓ OAC created: $OAC_ID"
            echo "id=$OAC_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Create CloudFront distribution
        id: cloudfront
        env:
          PREFIX: ${{ steps.config.outputs.prefix }}
          DOMAIN: ${{ steps.config.outputs.domain }}
          CERT_ARN: ${{ steps.acm.outputs.arn }}
          OAC_ID: ${{ steps.oac.outputs.id }}
        run: |
          EXISTING_DIST=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${PREFIX}'].{Id:Id,DomainName:DomainName}" --output json)
          EXISTING_ID=$(echo "$EXISTING_DIST" | jq -r '.[0].Id // empty')

          if [[ -n "$EXISTING_ID" ]]; then
            CF_DOMAIN=$(echo "$EXISTING_DIST" | jq -r '.[0].DomainName')
            echo "✓ Distribution already exists: $EXISTING_ID ($CF_DOMAIN)"
            echo "id=$EXISTING_ID" >> "$GITHUB_OUTPUT"
            echo "domain=$CF_DOMAIN" >> "$GITHUB_OUTPUT"
          else
            CALLER_REF="setup-$(date +%s)"

            cat > /tmp/dist-config.json << DISTEOF
          {
            "CallerReference": "${CALLER_REF}",
            "Comment": "${PREFIX}",
            "Enabled": true,
            "DefaultRootObject": "index.html",
            "HttpVersion": "http2and3",
            "PriceClass": "PriceClass_100",
            "Aliases": {
              "Quantity": 2,
              "Items": ["${DOMAIN}", "www.${DOMAIN}"]
            },
            "Origins": {
              "Quantity": 1,
              "Items": [
                {
                  "Id": "S3-${PREFIX}",
                  "DomainName": "${PREFIX}.s3.us-east-1.amazonaws.com",
                  "S3OriginConfig": { "OriginAccessIdentity": "" },
                  "OriginAccessControlId": "${OAC_ID}"
                }
              ]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "S3-${PREFIX}",
              "ViewerProtocolPolicy": "redirect-to-https",
              "CachePolicyId": "658327ea-f89d-4fab-a63d-7e88639e58f6",
              "Compress": true,
              "AllowedMethods": {
                "Quantity": 2,
                "Items": ["GET", "HEAD"]
              }
            },
            "CustomErrorResponses": {
              "Quantity": 2,
              "Items": [
                {
                  "ErrorCode": 403,
                  "ResponsePagePath": "/index.html",
                  "ResponseCode": "200",
                  "ErrorCachingMinTTL": 10
                },
                {
                  "ErrorCode": 404,
                  "ResponsePagePath": "/index.html",
                  "ResponseCode": "200",
                  "ErrorCachingMinTTL": 10
                }
              ]
            },
            "ViewerCertificate": {
              "ACMCertificateArn": "${CERT_ARN}",
              "SSLSupportMethod": "sni-only",
              "MinimumProtocolVersion": "TLSv1.2_2021"
            }
          }
          DISTEOF

            RESULT=$(aws cloudfront create-distribution \
              --distribution-config file:///tmp/dist-config.json --output json)
            DIST_ID=$(echo "$RESULT" | jq -r '.Distribution.Id')
            CF_DOMAIN=$(echo "$RESULT" | jq -r '.Distribution.DomainName')

            echo "✓ Distribution created: $DIST_ID ($CF_DOMAIN)"
            echo "id=$DIST_ID" >> "$GITHUB_OUTPUT"
            echo "domain=$CF_DOMAIN" >> "$GITHUB_OUTPUT"
          fi

      # ── S3 Bucket Policy for CloudFront ─────────────────────────
      - name: Update S3 bucket policy
        env:
          BUCKET: ${{ steps.config.outputs.prefix }}
          DIST_ID: ${{ steps.cloudfront.outputs.id }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)

          cat > /tmp/bucket-policy.json << BPEOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowCloudFrontServicePrincipal",
                "Effect": "Allow",
                "Principal": {
                  "Service": "cloudfront.amazonaws.com"
                },
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::${BUCKET}/*",
                "Condition": {
                  "StringEquals": {
                    "AWS:SourceArn": "arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${DIST_ID}"
                  }
                }
              }
            ]
          }
          BPEOF

          aws s3api put-bucket-policy --bucket "$BUCKET" --policy file:///tmp/bucket-policy.json
          echo "✓ Bucket policy updated"

      # ── Cloudflare DNS Records ──────────────────────────────────
      # Safety: only creates/updates records for $DOMAIN and www.$DOMAIN.
      # Never lists, deletes, or modifies any other records.
      - name: Add DNS records to Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DOMAIN: ${{ steps.config.outputs.domain }}
          CF_DOMAIN: ${{ steps.cloudfront.outputs.domain }}
        run: |
          ZONE_ID=$(curl -sf "https://api.cloudflare.com/client/v4/zones?name=${DOMAIN}" \
            -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')

          for RECORD_NAME in "$DOMAIN" "www.${DOMAIN}"; do
            echo "Processing: $RECORD_NAME → $CF_DOMAIN"

            EXISTING=$(curl -sf \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${RECORD_NAME}&type=CNAME" \
              -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result')
            EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id // empty')

            if [[ -n "$EXISTING_ID" ]]; then
              curl -sf -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${EXISTING_ID}" \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"CNAME\",\"name\":\"${RECORD_NAME}\",\"content\":\"${CF_DOMAIN}\",\"proxied\":false,\"ttl\":1}" \
                | jq '.success'
              echo "✓ Updated: $RECORD_NAME"
            else
              curl -sf -X POST \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"CNAME\",\"name\":\"${RECORD_NAME}\",\"content\":\"${CF_DOMAIN}\",\"proxied\":false,\"ttl\":1}" \
                | jq '.success'
              echo "✓ Created: $RECORD_NAME"
            fi
          done

      - name: Summary
        env:
          PREFIX: ${{ steps.config.outputs.prefix }}
          DOMAIN: ${{ steps.config.outputs.domain }}
          CERT_ARN: ${{ steps.acm.outputs.arn }}
          DIST_ID: ${{ steps.cloudfront.outputs.id }}
          CF_DOMAIN: ${{ steps.cloudfront.outputs.domain }}
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  Infrastructure ready for $DOMAIN"
          echo "══════════════════════════════════════════════════"
          echo "  S3 Bucket:      $PREFIX"
          echo "  ACM Cert:       $CERT_ARN"
          echo "  CloudFront ID:  $DIST_ID"
          echo "  CloudFront URL: $CF_DOMAIN"
          echo "  DNS:            $DOMAIN → $CF_DOMAIN"
          echo "                  www.$DOMAIN → $CF_DOMAIN"
          echo "══════════════════════════════════════════════════"
