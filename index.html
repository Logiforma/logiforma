<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://logiforma.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Logiforma">
    <meta property="og:title" content="Logiforma — Digital Backbone for Enterprise Operations">
    <meta property="og:description" content="Transform your enterprise ERP ecosystem with intelligent automation, seamless integrations and data-driven insights. PaaS & SaaS solutions.">
    <meta property="og:url" content="https://logiforma.com/">
    <meta property="og:image" content="https://logiforma.com/logo-opaque/Logo%20-%20Dark.png">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Logiforma — Digital Backbone for Enterprise Operations">
    <meta name="twitter:description" content="Transform your enterprise ERP ecosystem with intelligent automation, seamless integrations and data-driven insights.">
    <meta name="twitter:image" content="https://logiforma.com/logo-opaque/Logo%20-%20Dark.png">

    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Logiforma — Digital Backbone for Enterprise Operations</title>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Logiforma",
      "url": "https://logiforma.com",
      "logo": "https://logiforma.com/logo-opaque/Logo%20-%20Dark.png",
      "description": "Next-generation digital platform provider focused on transforming enterprise ERP ecosystems through intelligent automation, seamless integrations and data-driven insights.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bangalore",
        "addressCountry": "IN"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Logiforma",
      "url": "https://logiforma.com"
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
